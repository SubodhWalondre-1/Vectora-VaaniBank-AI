name: Keep Render Alive

on:
  schedule:
    # Ping every 14 minutes to prevent Render free-tier cold starts
    - cron: '*/14 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend
        run: |
          curl -sf https://vaanibank-backend.onrender.com/docs > /dev/null && echo "✅ Backend is alive" || echo "⚠️ Backend waking up..."
