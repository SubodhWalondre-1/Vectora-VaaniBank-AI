# Union Bank of India — Official Knowledge Base for RAG
# Version: 2.5 (May 2026) — Comprehensive Retail, Digital & Overseas Data

kyc_standards:
  mandatory_baseline:
    - "PAN Card (or Form 60 declaration)"
    - "Two recent passport-size photographs"
    - "One Officially Valid Document (OVD) for Identity and Address"
  proof_of_identity_poi:
    - "Aadhaar Card"
    - "Passport"
    - "Voter ID"
    - "Driving License"
    - "NREGA Job Card (must be duly signed by a State Government officer)"
  proof_of_address_poa:
    notes: "If POI contains current address, it serves as POA automatically."
    accepted_documents:
      utility_bills: "Electricity, landline/postpaid mobile, piped gas, or water bill (max 2 months old)"
      property_tax: "Property or Municipal Tax receipt"
      pension_orders: "PPO issued to retired govt/PSU employees (must contain current address)"
      accommodation_letters: "Allotment letter from Govt, PSU, Scheduled Commercial Bank, or Listed Company"

document_checklists:
  standard_baseline:
    - "Duly filled application form"
    - "KYC documents (POI/POA)"
    - "Passport-size photographs"

  education_loan:
    must_have:
      - "Academic documents (10th/12th/Graduation mark sheets)"
      - "College admission letter and detailed fee schedule"
      - "Last 12 months bank statements (Borrower, Co-borrower, Guarantor)"
      - "Income proof (ITR/Form 16) of co-borrower/guarantor"
    optional_conditional:
      - "Caste certificate (only for Govt interest subsidy schemes)"
    moratorium_repayment:
      emi_commencement: "1 year after course completion OR 6 months after securing employment, whichever is earlier."
      moratorium_interest: "Borrowers can pay interest during moratorium to prevent compounding."
      max_tenure: "15 years (excluding moratorium)."
      course_extension: "Submit official university letter before original end date for moratorium extension."
    csis_subsidy:
      eligibility:
        - "EWS category (Annual parental income up to ₹4.5 Lakh)"
        - "Professional/Technical course in approved Indian HEI"
      notes: "100% full interest subvention. Applicable for DOMESTIC studies only (not abroad)."

  home_loan:
    must_have:
      salaried: "Last 2 years ITR/Form 16 + Latest 3 months salary slips"
      non_salaried: "Last 3 years ITR + Proof of business existence"
      general:
        - "Last 6 months bank statements"
        - "Agreement to Sell or Allotment Letter"
        - "Property ownership documents (Title deed, original sale deed, or society share certificate)"
        - "Copy of building plan approved by local municipal body"
    optional_conditional:
      - "NOC from Builder/Developer/Housing Society"
      - "Advance payment or own-contribution receipts"
      - "Estimated cost of construction/renovation (for construction loans)"

  vehicle_loan:
    must_have:
      salaried: "Last 2 years ITR/Form 16 + Latest 3 months salary slips"
      non_salaried: "Last 2 years ITR"
      general:
        - "Last 6 months bank statements"
        - "Proforma invoice from authorized vehicle dealer"
        - "Receipt of advance/booking amount already paid"
    optional_conditional:
      - "Sanction letter and last 12 months account statement (for loan takeovers)"

  personal_loan:
    must_have:
      salaried: "Last 2 years ITR/Form 16 + Latest 3 months salary slips"
      non_salaried: "Last 2 years ITR"
      general:
        - "Office or business address proof"
        - "Last 12 months bank statements"

education_loan_matrices:
  pm_vidyalaxmi_scheme:
    target: "Quality Higher Education Institutions (QHEIs) in India"
    qhei_definition:
      - "All HEIs in Top 100 NIRF overall/category/domain rankings"
      - "All Govt HEIs in Top 101-200 NIRF"
      - "All Central Govt run institutions"
    loan_ceiling: "Need-based (no maximum cap)"
    refusal_policy: "Cannot be refused based on income > ₹8L; income only determines subvention eligibility."
    collateral_requirement: "NIL (strictly collateral-free and guarantor-free even for loans > ₹7.5 Lakh for QHEIs)"
    credit_guarantee: "75% coverage up to ₹7.50 Lakh"
    interest_subvention:
      income_upto_4.5l: "100% full subvention during course + moratorium"
      income_4.5l_to_8l: "3% subvention for loans up to ₹10 Lakh"
      application: "Digital via Vidya Lakshmi Portal (CELAF form)"
    delivery_mechanism: "Direct credit via CBDC (Central Bank Digital Currency) e-vouchers to loan account"

  premier_institute_abroad:
    quantum_limits: "Min ₹7.50 Lakh; No upper ceiling for Ivy League/Premier Global (need-based)"
    unsecured_limits:
      category_a: "Up to ₹40 Lakh (No collateral/guarantee required, e.g., IITs/IIMs)"
      category_b: "Up to ₹30 Lakh"
    collateral_rules:
      above_unsecured_threshold: "Min 50% tangible collateral security required"
      rate_incentive: "0.50% concession if collateral >= 100% (even if unsecured-eligible)"
    margin_rules:
      standard: "15% on all overseas expenses"
      with_100pct_collateral: "0% margin (applicable if 100% liquid collateral like UBI FD is provided)"
    processing_fees:
      upto_40l: "₹10,000 + GST"
      above_40l: "1% of loan amount (refundable/adjustable on 1st disbursement)"
    coverage: "Covers tuition, living expenses (hostel/rent), round-trip airfare, and laptop purchase (per university estimate)."

  domestic_premier_institute:
    tier_1:
      institutes: "IITs, IIMs, NITs, ISB, XLRI"
      max_loan: "₹40 Lakh"
      margin: "0%"
      collateral: "NIL"
      co_applicant_rule: "Parent/guardian mandatory but their income/means NOT considered for core evaluation. Min CIBIL 650/-1 required."
    tier_2:
      max_loan: "₹20 Lakh"
      margin_upto_7.5l: "0%"
      margin_above_7.5l: "5%"
    margin_above_40l: "15% (unless 100% tangible collateral provided, then 0%)"

  general_baseline:
    thresholds:
      upto_4l:
        collateral: "Nil"
        tpg: "Nil"
        margin_inland: "0%"
        margin_abroad: "0%"
      4l_to_7.5l:
        collateral: "Nil"
        tpg: "Mandatory (Suitable)"
        margin_inland: "5%"
        margin_abroad: "15%"
      above_7.5l:
        collateral: "100% Tangible Security"
        tpg: "Mandatory Co-Applicant"
        margin_inland: "5%"
        margin_abroad: "15%"
    repayment:
      moratorium: "Course Duration + 12 Months (1 Year)"
      max_tenure: "15 Years after moratorium"

savings_account_rules:
  qab_tiering:
    notes: "QAB (Quarterly Average Balance) is calculated as the sum of EOD closing balances divided by total days in the quarter."
    calculation_formula: "QAB = Σ(Daily EOD Closing Balances) / Total Days in Quarter"
    guardrail_example: "If a metro user with a ₹1,000 target has ₹0 for 80 days of a 90-day quarter, they can avoid penalties by maintaining ₹9,000 for the final 10 days."
    with_cheque_book:
      rural: "₹250"
      semi_urban: "₹500"
      urban: "₹1,000"
      metro: "₹1,000"
    without_cheque_book:
      rural: "₹100"
      semi_urban: "₹250"
      urban: "₹500"
      metro: "₹500"
  shortfall_penalties:
    structure:
      - range: "₹750 to ₹999 (Shortfall up to ₹250)"
        flat_rate: "₹25"
        total_with_gst: "₹29.50"
      - range: "₹500 to ₹749 (Shortfall ₹251 to ₹500)"
        flat_rate: "₹50"
        total_with_gst: "₹59.00"
      - range: "Below ₹500 (Shortfall ₹501 to ₹1,000)"
        flat_rate: "₹100"
        total_with_gst: "₹118.00"
    exemptions:
      pensioners: "Completely exempt. AQB requirement relaxed to ₹25 (with chequebook) or ₹20 (without chequebook). Penalty is NIL."
      standard_senior_citizens: "Must maintain baseline AQB unless account is mapped to Pensioner variant or zero-balance digital variant."
  account_status:
    dormancy: "Inoperative after 2 years of zero customer-induced transactions"
    reactivation_process:
      location: "Must visit any physical branch (Home or Non-base)"
      artifacts:
        - "Signed Request for Activation form"
        - "Fresh self-attested OVD copies"
        - "Recent passport-size color photo"
      verification: "Original OVDs must be presented at counter for physical/biometric verification"
    online_reactivation_rule: "Blocked. Digital Re-KYC/Video-KYC is only for active accounts. Inoperative accounts require physical risk-clearance."
    transaction_classification:
      non_customer_induced: "Quarterly interest credit, automated service fee debits (do NOT reset timer)"
      customer_induced: "UPI, ATM, cash deposit, mobile login, clearing physical cheque (RESETS timer)"
    reactivation_fee: "NIL (strictly prohibited per RBI directives)"
    rag_note: "Auto-interest and service fees do NOT count as customer activity. Reactivation requires fresh KYC at home branch."
  bsbda_and_small_accounts:
    standard_bsbda:
      kyc: "Full KYC mapped"
      balance_cap: "No maximum cap"
      annual_credit: "Unlimited"
      chequebook: "25 free leaves per year"
    small_account:
      kyc: "Relaxed/Simplified KYC (Self-attested photo + declaration)"
      balance_cap: "₹50,000 at any point"
      annual_credit: "₹1,00,000 total credit footings per fiscal year"
      monthly_withdrawal_cap: "₹10,000 aggregate"
      chequebook: "Barred (Not provided)"
      block_rule: "Automatically frozen if balance > ₹50k or annual credit > ₹1L. Requires formal KYC to normalize."
    withdrawal_rules:
      free_limit: "4 free withdrawals per calendar month"
      channel_coverage: "Aggregated across all channels (Branch, ATM, AEPS, Digital IMPS/NEFT/RTGS)"
      deposits: "Always free and infinite"
    upgradation: "Submit 'Account Status Upgradation Request' with Aadhaar (e-KYC) and PAN Card at base branch."

