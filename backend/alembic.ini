# Alembic Configuration — VaaniBank AI
# PSBs Hackathon 2026 | Team Vectora

[alembic]
script_location = migrations
prepend_sys_path = .

# DATABASE_URL is overridden programmatically in migrations/env.py
# using the value from config.py — this line is a fallback placeholder.
sqlalchemy.url = postgresql+asyncpg://vaanibank:vaanibank123@localhost:5432/vaanibank_db

# Migration file naming
file_template = %%(rev)s_%%(slug)s

# Timezone for revision timestamps
timezone = UTC

# Max length of slug portion of filename
truncate_slug_length = 40

[post_write_hooks]
# No post-write hooks configured

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S